name: Sync Fork

on:
  schedule:
    # 每小时的第0分钟执行一次 (你可以根据需要调整频率)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 或者最新的版本
        with:
          # 使用 Personal Access Token (PAT) 以便有权限推送到你的 fork
          # 需要在仓库的 Settings > Secrets and variables > Actions 中创建一个名为 FORK_SYNC_TOKEN 的 secret
          # 这个 PAT 需要有 `repo` 权限
          token: ${{ secrets.FORK_SYNC_TOKEN }}
          # 获取所有历史记录，以便 rebase
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          # 将 YOUR_UPSTREAM_REPO_URL 替换为原始仓库的 URL
          # 例如：https://github.com/upstream_user/upstream_repo.git
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream

      - name: Sync main branch (or your default branch)
        run: |
          # 确保你本地的 main 分支是最新的
          git checkout main  # 或者你的默认分支名，例如 master
          git pull origin main # 或者你的默认分支名

          # 从上游 rebase (推荐，保持提交历史干净)
          git rebase upstream/main # 或者上游仓库的默认分支名
          # 或者，如果你想使用 merge (可能会产生合并提交)
          # git merge upstream/main

          # 将更改推送到你的 fork
          git push origin main # 或者你的默认分支名 --force (如果使用 rebase，可能需要强制推送)
